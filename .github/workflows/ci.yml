name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.12'
          cabal-version: 'latest'

      - name: Cache Cabal packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('cabal.project', 'haskell-agentic.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update Cabal index
        run: cabal update

      - name: Build library
        run: cabal build lib:haskell-agentic

      - name: Run tests
        run: cabal test haskell-agentic-test --test-show-details=streaming
        # Tests that require ANTHROPIC_KEY are skipped automatically (no key in CI)
        # Set the ANTHROPIC_KEY secret in GitHub repo settings to enable integration tests

      - name: Build documentation
        run: cabal haddock lib:haskell-agentic
